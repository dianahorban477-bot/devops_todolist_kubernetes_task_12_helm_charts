namespace: todo-apps
image:
  repository: mysql
  tag: "8.0"

replicas: 1

secrets:
  mysql-root-password: "SuperSecretPassword"

pvc:
  storage: 2Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 512Mi

tolerations:
  - key: "app"
    operator: "Equal"
    value: "mysql"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: app
          operator: In
          values:
          - mysql