replicas: 1

image:
  repository: mysql
  pullPolicy: IfNotPresent
  tag: "5.7"

service:
  type: ClusterIP
  port: 3306

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

pvc:
  storage: 1Gi

secrets:
  DB_ROOT_PASSWORD: "password"
  DB_NAME: "todoapp"
  DB_USER: "root"

nodeAffinity:
  key: app
  values:
    - todoapp
ingress:
  enabled: false
httpRoute:
  enabled: false